<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DoniStroi — производство и установка фасадных материалов в Атырау. Термопанели, полифасад, травертин. Бесплатный замер и 3D визуализация.">
  <meta name="keywords" content="фасадные панели Атырау, термопанели, полифасад, травертин, отделка фасада, DoniStroi">
  <meta property="og:title" content="DoniStroi — Фасадные материалы в Атырау">
  <meta property="og:type" content="website">
  <title>DoniStroi — Фасадные материалы в Атырау</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗</text></svg>">
</head>
<body>
  <div id="app">
    <div id="initLoader" style="position:fixed;inset:0;background:#0f0f0d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;font-family:'Jost',sans-serif;color:#8a8478;z-index:9999;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:#f5f2eb">Doni<span style="color:#c9a96e">Stroi</span></div>
      <div style="display:flex;gap:6px;">
        <span style="width:6px;height:6px;border-radius:50%;background:#c9a96e;animation:ldot 1.2s ease-in-out 0s infinite both"></span>
        <span style="width:6px;height:6px;border-radius:50%;background:#c9a96e;animation:ldot 1.2s ease-in-out 0.2s infinite both"></span>
        <span style="width:6px;height:6px;border-radius:50%;background:#c9a96e;animation:ldot 1.2s ease-in-out 0.4s infinite both"></span>
      </div>
      <style>@keyframes ldot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}</style>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
